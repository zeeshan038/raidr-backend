<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Live Tracking Tester</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #121212; color: #fff; padding: 2rem; max-width: 600px; margin: 0 auto; }
        input, button { padding: 10px; margin: 5px 0; border-radius: 6px; border: none; font-size: 16px; width: 100%; box-sizing: border-box; }
        button { background-color: #00e676; color: #000; font-weight: bold; cursor: pointer; }
        button:disabled { background-color: #555; color: #888; cursor: not-allowed; }
        #log { background: #1e1e1e; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 14px; min-height: 200px; max-height: 400px; overflow-y: auto; color: #a5d6ff; margin-top: 20px;}
        .error { color: #ff5252; }
        .success { color: #00e676; }
    </style>
</head>
<body>
    <h2>🏎️ Live Tracking Tester</h2>
    <p>Grab a JWT token from your <strong>/users/login</strong> API and paste it below to test the connection!</p>
    
    <input type="text" id="token" placeholder="Paste JWT Token here..." />
    <input type="text" id="tripId" placeholder="Trip ID (optional)" />
    
    <button id="connectBtn" onclick="connect()">Connect & Start Driving</button>
    <button id="collectBtn" onclick="collectBox()" disabled style="background-color: #ffd700; color: #000; margin-top: 10px;">🎁 Collect Green Box (+50 XP)</button>
    <button id="syncDistanceBtn" onclick="syncDistance()" disabled style="background-color: #4fc3f7; color: #000; margin-top: 10px;">🛣️ Sync Distance (+1.5 km)</button>
    <button id="disconnectBtn" onclick="disconnect()" disabled style="background-color: #ff5252; color: white;">Stop</button>

    <div id="log">Logs will appear here...<br/></div>

    <script>
        let ws;
        let interval;

        const logElement = document.getElementById('log');
        function log(msg, className = '') {
            logElement.innerHTML += `<div class="${className}">> ${msg}</div>`;
            logElement.scrollTop = logElement.scrollHeight;
        }

        function connect() {
            const token = document.getElementById('token').value;
            const tripId = document.getElementById('tripId').value || "test-trip-123";
            
            if (!token) {
                log('Error: Please enter a JWT token!', 'error');
                return;
            }

            log('Connecting to ws://localhost:3001...');
            ws = new WebSocket(`ws://localhost:3001/live-tracking?token=${token}`);

            ws.onopen = () => {
                log('✅ Connected to WebSocket!', 'success');
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('disconnectBtn').disabled = false;
                document.getElementById('collectBtn').disabled = false;
                document.getElementById('syncDistanceBtn').disabled = false;

                // Simulate driving by changing coordinates every 2 seconds
                let lat = 25.2048;
                let lng = 55.2708;
                
                interval = setInterval(() => {
                    lat += 0.001; // Move slightly
                    lng += 0.001;
                    
                    const payload = {
                        tripId: tripId,
                        lat: parseFloat(lat.toFixed(4)),
                        lng: parseFloat(lng.toFixed(4)),
                        heading: 90
                    };
                    
                    ws.send(JSON.stringify(payload));
                    log(`📡 Sent GPS: lat=${payload.lat}, lng=${payload.lng}`);
                }, 2000);
            };

            ws.onerror = (err) => {
                log('❌ Connection Error. Is your server and Redis running?', 'error');
                disconnect();
            };

            ws.onclose = () => {
                log('🔌 Disconnected.');
                disconnect();
            };
        }

        function collectBox() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('Error: Must be connected to collect a box!', 'error');
                return;
            }
            
            const payload = {
                type: 'box_collected',
                boxType: 'green',
                xpAmount: 50,
                source: 'route_stop' // 'route_stop' | 'exploration_drop' | 'surprise_me'
            };
            
            ws.send(JSON.stringify(payload));
            log(`🎁 Collected Box! Sent: ${JSON.stringify(payload)}`, 'success');
        }

        function syncDistance() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('Error: Must be connected to sync distance!', 'error');
                return;
            }
            
            const payload = {
                type: 'sync_distance',
                distanceCoveredKm: 1.5
            };
            
            ws.send(JSON.stringify(payload));
            log(`🛣️ Synced Distance! Sent: ${JSON.stringify(payload)}`, 'success');
        }

        function disconnect() {
            if (ws) ws.close();
            clearInterval(interval);
            document.getElementById('connectBtn').disabled = false;
            document.getElementById('disconnectBtn').disabled = true;
            document.getElementById('collectBtn').disabled = true;
            document.getElementById('syncDistanceBtn').disabled = true;
        }
    </script>
</body>
</html>
