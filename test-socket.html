<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raidr WebSocket Tester</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #0d0d0d; color: #fff; padding: 2rem; max-width: 800px; margin: 0 auto; }
        h2 { margin-top: 0; }
        h3 { color: #aaa; border-bottom: 1px solid #333; padding-bottom: 6px; }
        input, select { padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 14px; width: 100%; }
        .btn { padding: 10px 16px; margin: 5px 0; border-radius: 6px; border: none; font-size: 14px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-green  { background-color: #00e676; color: #000; }
        .btn-red    { background-color: #ff5252; color: #fff; }
        .btn-blue   { background-color: #4fc3f7; color: #000; }
        .btn-yellow { background-color: #ffd700; color: #000; }
        .btn-purple { background-color: #ce93d8; color: #000; }
        .btn:disabled { background-color: #333; color: #666; cursor: not-allowed; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
        .panel { background: #1a1a1a; border-radius: 10px; padding: 16px; border: 1px solid #2a2a2a; }
        #log, #eventLog { background: #111; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 12px; min-height: 180px; max-height: 300px; overflow-y: auto; color: #a5d6ff; margin-top: 10px; }
        .error   { color: #ff5252; }
        .success { color: #00e676; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-right: 4px; }
        .tag-snap { background: #1565c0; }
        .tag-part { background: #2e7d32; }
        .tag-inv  { background: #e65100; }
        .tag-cmd  { background: #6a1b9a; }
        .tag-stat { background: #37474f; }
        .tag-err  { background: #b71c1c; }
    </style>
</head>
<body>
    <h2>🏎️ Raidr WebSocket Tester</h2>

    <!-- SHARED TOKEN -->
    <div class="panel">
        <h3>🔑 Auth</h3>
        <input type="text" id="token" placeholder="Paste JWT Token here..." />
        <p style="color:#777; font-size:12px; margin:4px 0 0;">Get this from POST /api/user/login</p>
    </div>

    <div class="grid">

        <!-- LIVE TRACKING -->
        <div class="panel">
            <h3>📡 Live Tracking</h3>
            <input type="text" id="tripId" placeholder="Trip ID (optional)" />
            <input type="number" id="stopIndex" placeholder="Stop Index (e.g. 1)" value="1" />
            <input type="text" id="stopDate" placeholder="Stop Date (e.g. 2026-05-17)" />
            <select id="boxSource">
                <option value="route_stop">route_stop</option>
                <option value="exploration_drop">exploration_drop</option>
                <option value="surprise_me">surprise_me</option>
            </select>
            <button class="btn btn-green" id="connectBtn" onclick="connect()">Connect &amp; Start Driving</button>
            <button class="btn btn-yellow" id="collectBtn" onclick="collectBox()" disabled>🎁 Collect Box (+50 XP)</button>
            <button class="btn btn-blue" id="syncDistanceBtn" onclick="syncDistance()" disabled>🛣️ Sync Distance (+1.5 km)</button>
            <button class="btn btn-red" id="disconnectBtn" onclick="disconnect()" disabled>Stop</button>
            <div id="log">Tracking logs will appear here...<br/></div>
        </div>

        <!-- LIVE EVENTS -->
        <div class="panel">
            <h3>🎯 Live Events</h3>
            <input type="text" id="eventId" placeholder="Event ID (UUID)" />
            <button class="btn btn-purple" id="joinRoomBtn" onclick="joinEventRoom()">Join Event Room (Socket)</button>
            <button class="btn btn-yellow" id="simulateClaimBtn" onclick="simulateClaim()">🏆 Simulate: inventory_updated</button>
            <button class="btn btn-blue" id="simulateCmdBtn" onclick="simulateCommander()">💬 Simulate: commander_message</button>
            <button class="btn btn-green" id="simulatePartBtn" onclick="simulateParticipant()">👥 Simulate: participant_joined</button>
            <p style="color:#777; font-size:11px; margin:6px 0 0;">ℹ️ Simulate buttons inject a fake event into the log so you can verify parsing without hitting the REST API.</p>
            <div id="eventLog">Event socket logs will appear here...<br/></div>
        </div>

    </div>

    <script>
        let ws;
        let interval;
        let currentLat = 25.2048;
        let currentLng = 55.2708;

        function log(msg, className) {
            className = className || '';
            const el = document.getElementById('log');
            el.innerHTML += '<div class="' + className + '">> ' + msg + '</div>';
            el.scrollTop = el.scrollHeight;
        }

        function eventLog(tag, tagClass, msg) {
            const el = document.getElementById('eventLog');
            el.innerHTML += '<div><span class="tag ' + tagClass + '">' + tag + '</span>' + msg + '</div>';
            el.scrollTop = el.scrollHeight;
        }

        function connect() {
            const token = document.getElementById('token').value;
            const tripId = document.getElementById('tripId').value || 'test-trip-123';
            if (!token) { log('Error: Please enter a JWT token!', 'error'); return; }

            log('Connecting to ws://localhost:3001/live-tracking...');
            ws = new WebSocket('ws://localhost:3001/live-tracking?token=' + token);

            ws.onopen = function() {
                log('Connected to WebSocket!', 'success');
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('disconnectBtn').disabled = false;
                document.getElementById('collectBtn').disabled = false;
                document.getElementById('syncDistanceBtn').disabled = false;

                interval = setInterval(function() {
                    currentLat += 0.001;
                    currentLng += 0.001;
                    const payload = {
                        tripId: tripId,
                        lat: parseFloat(currentLat.toFixed(4)),
                        lng: parseFloat(currentLng.toFixed(4)),
                        heading: 90
                    };
                    ws.send(JSON.stringify(payload));
                    log('Sent GPS: lat=' + payload.lat + ', lng=' + payload.lng);
                }, 2000);
            };

            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    handleIncomingEvent(data);
                } catch(e) {
                    eventLog('RAW', 'tag-err', event.data);
                }
            };

            ws.onerror = function() {
                log('Connection Error. Is your server and Redis running?', 'error');
                disconnect();
            };

            ws.onclose = function() {
                log('Disconnected.');
                disconnect();
            };
        }

        function handleIncomingEvent(data) {
            if (data.type === 'event_snapshot') {
                eventLog('SNAPSHOT', 'tag-snap',
                    ' <strong>' + data.title + '</strong> | Status: <strong>' + data.status + '</strong>' +
                    ' | Inventory: <strong>' + data.remainingQty + '/' + data.rewardQuantity + '</strong>' +
                    ' | Players: <strong>' + data.totalParticipants + '</strong>');

            } else if (data.type === 'participant_joined') {
                eventLog('JOINED', 'tag-part',
                    ' Total participants now: <strong>' + data.totalParticipants + '</strong>');

            } else if (data.type === 'inventory_updated') {
                eventLog('INVENTORY', 'tag-inv',
                    ' Rewards remaining: <strong>' + data.remainingQty + '</strong>');

            } else if (data.type === 'commander_message') {
                eventLog('COMMANDER', 'tag-cmd',
                    ' [' + data.sender + '] <em>' + data.text + '</em>');

            } else if (data.type === 'event_status_changed') {
                eventLog('STATUS', 'tag-stat',
                    ' Event is now: <strong>' + data.status + '</strong>');

            } else if (data.type === 'error') {
                eventLog('ERROR', 'tag-err', ' ' + data.msg);

            } else {
                eventLog('MSG', 'tag-snap', ' ' + JSON.stringify(data));
            }
        }

        function joinEventRoom() {
            const eventId = document.getElementById('eventId').value;
            if (!eventId) { eventLog('ERROR', 'tag-err', ' Event ID is required!'); return; }
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                eventLog('ERROR', 'tag-err', ' Not connected! Hit Connect first.');
                return;
            }
            ws.send(JSON.stringify({ type: 'join_event', eventId: eventId }));
            eventLog('SENT', 'tag-snap', ' Subscribed to room: <strong>' + eventId + '</strong>');
        }

        // Local simulation helpers — no server call needed
        function simulateClaim() {
            handleIncomingEvent({ type: 'inventory_updated', remainingQty: 84 });
        }
        function simulateCommander() {
            handleIncomingEvent({ type: 'commander_message', sender: 'system', text: 'Hurry! Only 84 rewards left!' });
        }
        function simulateParticipant() {
            handleIncomingEvent({ type: 'participant_joined', totalParticipants: 107 });
        }

        function collectBox() {
            if (!ws || ws.readyState !== WebSocket.OPEN) { log('Error: Must be connected!', 'error'); return; }
            const tripId = document.getElementById('tripId').value;
            const index  = document.getElementById('stopIndex').value;
            const date   = document.getElementById('stopDate').value;
            const source = document.getElementById('boxSource').value;
            const payload = {
                type: 'box_collected', boxType: 'green', xpAmount: 50, source: source,
                tripId: tripId || undefined,
                index: index !== '' ? parseInt(index) : undefined,
                date: date || undefined,
                lat: parseFloat(currentLat.toFixed(4)),
                lng: parseFloat(currentLng.toFixed(4)),
                ad: { id: '40f32ef5-9b24-4311-86e1-36dd2f3de46a', adTitle: '1+1 Drinks Special', imageUrl: '', merchantName: 'Starbucks' }
            };
            ws.send(JSON.stringify(payload));
            log('Collected Box! source=' + source, 'success');
        }

        function syncDistance() {
            if (!ws || ws.readyState !== WebSocket.OPEN) { log('Error: Must be connected!', 'error'); return; }
            ws.send(JSON.stringify({ type: 'sync_distance', distanceCoveredKm: 1.5 }));
            log('Synced Distance +1.5 km', 'success');
        }

        function disconnect() {
            if (ws) ws.close();
            clearInterval(interval);
            document.getElementById('connectBtn').disabled = false;
            document.getElementById('disconnectBtn').disabled = true;
            document.getElementById('collectBtn').disabled = true;
            document.getElementById('syncDistanceBtn').disabled = true;
        }
    </script>
</body>
</html>
